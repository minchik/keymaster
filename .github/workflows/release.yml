name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # manual runs are for debugging; version is derived from a v* tag

permissions:
  contents: write       # create the GitHub Release in this repo

jobs:
  test:
    uses: ./.github/workflows/ci.yml   # gate the release on the unit tests

  release:
    needs: test
    runs-on: macos-26
    env:
      PROJECT: keymaster/keymaster.xcodeproj
      SCHEME: keymaster
      TEAM_ID: "57ACZ9RAXL"
      TAP_REPO: minchik/homebrew-tap          # cask-bump target; step is skipped if TAP_TOKEN is unset
      TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.DEVELOPER_ID_P12 }}
          p12-password: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}

      - name: Install provisioning profile
        env:
          PROFILE_B64: ${{ secrets.DEVELOPER_ID_PROFILE }}
        run: |
          for dir in "$HOME/Library/MobileDevice/Provisioning Profiles" \
                     "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            mkdir -p "$dir"
            printf '%s' "$PROFILE_B64" | base64 --decode > "$dir/keymaster.provisionprofile"
          done

      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: printf '%s' "$ASC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc.p8"

      - name: Version from tag
        id: ver
        env:
          REF_NAME: ${{ github.ref_name }}   # untrusted: passed via env, never spliced into script text
        run: |
          version="${REF_NAME#v}"
          # Hard guard: only vMAJOR.MINOR.PATCH is allowed, so the value can never
          # carry shell metacharacters into later steps (defense in depth with env:).
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$REF_NAME' must be vMAJOR.MINOR.PATCH (got '$version')"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Archive
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/keymaster.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            PROVISIONING_PROFILE_SPECIFIER="keymaster Developer ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER"

      - name: Export Developer ID app
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/keymaster.xcarchive" \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/export"

      - name: Notarize and staple
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER: ${{ secrets.ASC_ISSUER }}
        run: |
          APP="$RUNNER_TEMP/export/Keymaster.app"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/asc.p8" \
            --key-id "$ASC_KEY_ID" \
            --issuer "$ASC_ISSUER" \
            --wait
          xcrun stapler staple "$APP"

      - name: Package
        id: pkg
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          APP="$RUNNER_TEMP/export/Keymaster.app"
          ZIP="keymaster-${VERSION}.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$ZIP" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pkg.outputs.zip }}
          fail_on_unmatched_files: true

      - name: Bump Homebrew cask
        if: ${{ env.TAP_TOKEN != '' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          SHA: ${{ steps.pkg.outputs.sha256 }}
        run: |
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" tap
          CASK="tap/Casks/keymaster.rb"
          sed -i '' -E "s|^  version \".*\"|  version \"${VERSION}\"|" "$CASK"
          sed -i '' -E "s|^  sha256 \".*\"|  sha256 \"${SHA}\"|" "$CASK"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/keymaster.rb
          git diff --cached --quiet || git commit -m "keymaster ${VERSION}"
          git push

      - name: Cleanup API key
        if: always()
        run: rm -f "$RUNNER_TEMP/asc.p8"
