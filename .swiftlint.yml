# SwiftLint config for keymaster (single-file CLI).
# Install: brew install swiftlint   |   Run: swiftlint

included:
  - keymaster/keymaster/keymasterApp.swift
  - keymaster/keymaster/RunSupport.swift
  - keymaster/keymaster/SecretManager.swift
  - keymaster/keymaster/TerminalInput.swift
  - keymaster/keymaster/SystemKeychain.swift
  - keymaster/keymaster/OAuthRecord.swift
  - keymaster/keymaster/TokenExchanger.swift
  - keymaster/keymaster/OAuthManager.swift
  - keymaster/keymaster/URLSessionTokenExchanger.swift

disabled_rules:
  - todo
  - trailing_whitespace
  # "Keymaster" is the fixed product/command name; the "master" substring is not
  # a non-inclusive choice we control, so this rule would never be actionable.
  - inclusive_language

line_length:
  warning: 120
  error: 160

function_body_length:
  warning: 80
  error: 120

# keymasterApp.swift carries the CLI surface for every subcommand (set/get/rm/run
# plus the oauth group) plus the app-only exec syscall wrapper (execCommand), all
# with the project's heavy explanatory comments, so it runs past the 400-line
# default. Raise the threshold rather than thin the documentation.
file_length:
  warning: 700
  error: 800
